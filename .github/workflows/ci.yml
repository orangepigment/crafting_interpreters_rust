name: CI

on:
    push:
    pull_request:

env:
    CARGO_TERM_COLOR: always

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        env:
            TEST_TOOLS_LOCATION: "${{github.workspace}}/craftinginterpreters"
            SUITE_NAME: "chap04_scanning"
        steps:
            - uses: actions/checkout@v5
            - name: Check out the original book repo
              uses: actions/checkout@master
              with:
                  repository: munificent/craftinginterpreters
                  path: ${{env.TEST_TOOLS_LOCATION}}
                  # token: ${{ secrets.my_pat }}
            - uses: dtolnay/rust-toolchain@stable
            - uses: dart-lang/setup-dart@v1
            - run: rustup update
            - run: cargo build --verbose
            - run: cargo test --verbose
            - run: make test_java
            - run: |
                  cargo --config "env.TEST_TOOLS_LOCATION='${TEST_TOOLS_LOCATION}'" \
                  --config "env.SUITE_NAME='${SUITE_NAME}'" \
                  test
